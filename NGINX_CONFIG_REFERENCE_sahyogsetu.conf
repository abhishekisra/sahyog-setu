server {
    server_name sahyogsetu.in www.sahyogsetu.in;

    root /var/www/html;
    index index.html;

    location /media/ {
        alias /var/www/html/SAHYOG_SETU_ADMIN/media/;
    }

    location /public/static/ {
        alias /var/www/html/SAHYOG_SETU_ADMIN/public/static/;
    }

    # SAHYOG_SETU_ADMIN/ physically lives under the nginx root (/var/www/html),
    # so without this block every file in the Django project — settings.py
    # (SECRET_KEY, DB password), manage.py, .git/, source .py files — was
    # directly downloadable over the web via the generic try_files fallback
    # below. The only things that legitimately need direct serving from
    # inside that folder are /media/ and /public/static/, already aliased
    # above as their own top-level URL paths — nothing legitimate is ever
    # requested at a literal /SAHYOG_SETU_ADMIN/... URL.
    location ^~ /SAHYOG_SETU_ADMIN/ {
        deny all;
        return 404;
    }

    # Exact match for /admin/ - proxy to Django
    location = /admin/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/html/SAHYOG_SETU_ADMIN/sahyogsetu.sock;
    }

    # Rewrite /admin/api/* -> /api/*
    location ^~ /admin/api/ {
        rewrite ^/admin/api/(.*)$ /api/$1 break;
        proxy_pass http://unix:/var/www/html/SAHYOG_SETU_ADMIN/sahyogsetu.sock;
        include proxy_params;
    }

    # All Django backend routes
    location ~ ^/(admin|developer-admin|api|dashboard|login|logout|quizzes|quiz) {
        include proxy_params;
        proxy_pass http://unix:/var/www/html/SAHYOG_SETU_ADMIN/sahyogsetu.sock;
    }

    # React Frontend
    location / {
        try_files $uri $uri/ =404;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sahyogsetu.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sahyogsetu.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.sahyogsetu.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = sahyogsetu.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name sahyogsetu.in www.sahyogsetu.in;
    listen 80;
    return 404; # managed by Certbot




}