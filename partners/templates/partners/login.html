<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Partner Login — Sahyog Setu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#122019; --card:#213627; --card-hi:#2b4634;
      --ink:#f4efe1; --ink-soft:#adc2b1; --ink-faint:#7d9583;
      --gold:#c9a227; --gold-hi:#ffd75e; --red:#ff5c5c;
      --line:rgba(201,162,39,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; font-family:'Mukta',system-ui,sans-serif; color:var(--ink);
      background:
        radial-gradient(1200px 700px at 80% -10%, #1d3628 0%, transparent 60%),
        radial-gradient(900px 600px at -10% 110%, #1a2e22 0%, transparent 55%),
        var(--bg);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .panel{
      width:100%; max-width:400px; border-radius:26px;
      background:linear-gradient(165deg,var(--card-hi),var(--card));
      border:1px solid var(--line); box-shadow:0 30px 70px rgba(0,0,0,.5);
      overflow:hidden;
    }
    .gold-line{ height:4px; background:linear-gradient(90deg,transparent,var(--gold),var(--gold-hi),var(--gold),transparent); }
    .body{ padding:36px 30px 34px; }
    .seal{
      width:44px;height:44px;border-radius:50%; margin:0 auto 14px;
      background:conic-gradient(from 210deg,var(--gold-hi),var(--gold),#8a6d16,var(--gold-hi));
      display:grid;place-items:center; color:#122019; font-weight:700; font-size:19px;
    }
    .eyebrow{ color:var(--gold-hi); font-weight:600; letter-spacing:2.5px; font-size:11.5px; text-transform:uppercase; margin-bottom:8px; text-align:center; }
    .title{ font-family:'Fraunces'; font-weight:600; font-size:24px; margin:0 0 26px; text-align:center; }
    .alert{ background:rgba(255,92,92,.12); border:1px solid rgba(255,92,92,.4); color:#ffd7d7; padding:12px 16px; border-radius:12px; margin-bottom:20px; font-size:14px; }
    .field{ margin-bottom:18px; }
    .field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:7px; }
    .input{
      width:100%; font-family:'Mukta'; font-size:15px; color:var(--ink);
      background:rgba(0,0,0,.22); border:1px solid var(--line); border-radius:12px; padding:13px 15px;
    }
    .input:focus{ outline:none; border-color:var(--gold-hi); background:rgba(0,0,0,.32); }
    .btn{
      width:100%; font-family:'Mukta'; font-weight:700; font-size:16px; cursor:pointer; border:none;
      color:#10231a; padding:14px 22px; border-radius:14px; margin-top:6px;
      background:linear-gradient(180deg,var(--gold-hi),var(--gold));
      border-bottom:4px solid #8a6d16;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="gold-line"></div>
    <div class="body">
      <div class="seal">स</div>
      <div class="eyebrow">Sahyog Setu</div>
      <h1 class="title">Partner Portal</h1>

      {% if error %}<div class="alert">{{ error }}</div>{% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="field">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" class="input" value="{{ username|default:'' }}"
              autocapitalize="off" autocorrect="off" spellcheck="false" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" class="input" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Login →</button>
      </form>
    </div>
  </div>
</body>
</html>
